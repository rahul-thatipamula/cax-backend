server:
  port: 8080

app:
  env: ${APP_ENV:production}
  encryption:
    key: ${APP_ENCRYPTION_KEY}

spring:
  application:
    name: cax_backend
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  data:
    mongodb:
      uri: ${MONGODB_URI}
      database: ${MONGODB_DATABASE}
      auto-index-creation: true
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  admin-expiration: ${JWT_ADMIN_EXPIRATION}

# Google Configuration
google:
  client-id: ${GOOGLE_CLIENT_ID}

# Google Play Configuration
google-play:
  package-name: ${GOOGLE_PLAY_PACKAGE_NAME}
  credentials-path: ${GOOGLE_APPLICATION_CREDENTIALS}

# Swagger
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Logging
logging:
  level:
    root: INFO
    "[com.cax]": DEBUG
    "[org.springframework.security]": INFO

# Razorpay
razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}

# Cloudflare R2 S3-Compatible Storage Configuration
r2:
  endpoint: ${R2_ENDPOINT}
  access-key: ${R2_ACCESS_KEY}
  secret-key: ${R2_SECRET_KEY}
  bucket-name: ${R2_BUCKET_NAME}
  public-url: ${R2_PUBLIC_URL}

# Cloudflare Turnstile (CAPTCHA for the public bulletin-event submission form)
turnstile:
  secret-key: ${TURNSTILE_SECRET_KEY:}
  # Local dev only: allows submissions through when no secret is set. Leave false in
  # production — without it an unset secret would silently disable CAPTCHA entirely.
  allow-insecure-skip: ${TURNSTILE_ALLOW_INSECURE_SKIP:false}
